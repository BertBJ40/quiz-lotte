<title>Quiz voor Lotte</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #e7f0fb 0%, #eef6ff 100%);
    color: #2c2336; line-height: 1.5; padding: 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  .card {
    background: #fff; border-radius: 20px; padding: 24px;
    box-shadow: 0 8px 30px rgba(40,90,160,0.15); margin-bottom: 18px;
  }
  h1 { font-size: 1.9rem; margin: 0 0 6px; color: #1c6dd0; }
  .sub { color: #5d7794; font-size: 0.95rem; margin-bottom: 4px; }
  .progress-bar { height: 8px; background: #dce8f5; border-radius: 8px; overflow: hidden; margin: 18px 0 4px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#4dabf7,#1c6dd0); width: 0; transition: width .3s; }
  .qnum { font-size: 0.85rem; color: #1864ab; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
  .qtext { font-size: 1.25rem; font-weight: 600; margin: 8px 0 16px; white-space: pre-line; }
  img.qimg { width: 100%; max-width: 360px; display:block; margin: 4px auto 18px; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
  .opt {
    display: block; width: 100%; text-align: left; padding: 14px 16px; margin: 8px 0;
    border: 2px solid #dce8f5; border-radius: 14px; background: #fff; font-size: 1rem;
    cursor: pointer; transition: .15s; color: #2c2336;
  }
  .opt:hover { border-color: #4dabf7; }
  .opt.sel { border-color: #1c6dd0; background: #e7f1fd; font-weight: 600; }
  input[type=text] {
    width: 100%; padding: 14px 16px; border: 2px solid #dce8f5; border-radius: 14px;
    font-size: 1rem; font-family: inherit; background:#fff;
  }
  input[type=text]:focus { outline: none; border-color: #4dabf7; }
  .btn {
    display: inline-block; padding: 14px 28px; border: none; border-radius: 30px;
    background: linear-gradient(90deg,#1c6dd0,#1864ab); color: #fff; font-size: 1.05rem;
    font-weight: 700; cursor: pointer; margin-top: 18px; box-shadow: 0 4px 14px rgba(28,109,208,.35);
    transition: transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn.ghost { background: #fff; color: #1c6dd0; border: 2px solid #dce8f5; box-shadow: none; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .hint { font-size: .85rem; color: #8aa3bf; margin-top: 10px; }
  .res-q { padding: 16px 0; border-bottom: 1px solid #e3edf7; }
  .res-q:last-child { border-bottom: none; }
  .badge { display:inline-block; font-size: .75rem; font-weight:700; padding: 3px 10px; border-radius: 20px; margin-bottom:6px;}
  .b-good { background:#d3f9d8; color:#2b8a3e; }
  .b-bad { background:#ffe3e3; color:#c92a2a; }
  .b-open { background:#fff3bf; color:#9c7a00; }
  .res-given { color:#555; }
  .res-correct { color:#2b8a3e; font-weight:600; }
  .score-big { font-size:3rem; font-weight:800; color:#1c6dd0; text-align:center; margin:10px 0; }
  .score-msg { text-align:center; font-size:1.15rem; margin-bottom:10px; }
  .center { text-align:center; }
  .emoji { font-size:2.5rem; }
</style>

var cur = 0;
var answers = [];
for (var k=0;k<QUESTIONS.length;k++) answers.push(null);
var app = document.getElementById('app');

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function norm(s){ return (s||'').toLowerCase().trim().replace(/[.,!?'"]/g,'').replace(/\s+/g,' '); }

function render(){
  var q = QUESTIONS[cur];
  var pct = Math.round((cur/QUESTIONS.length)*100);
  var inner = '';
  if(q.t === 'mc'){
    for(var i=0;i<q.opts.length;i++){
      var sel = answers[cur]===i ? ' sel' : '';
      inner += '<button class="opt'+sel+'" onclick="pick('+i+')">'+esc(q.opts[i])+'</button>';
    }
  } else {
    var val = answers[cur]!==null ? answers[cur] : '';
    inner = '<input type="text" id="txt" value="'+esc(val).replace(/"/g,'&quot;')+'" placeholder="Typ je antwoord…" oninput="answers['+cur+']=this.value">';
  }
  var imgHtml = q.img ? '<img class="qimg" src="'+q.img+'" alt="foto">' : '';
  var backBtn = cur>0 ? '<button class="btn ghost" onclick="prev()">← Terug</button>' : '';
  var isLast = cur === QUESTIONS.length-1;
  var nextLabel = isLast ? 'Klaar! Toon resultaat 🎉' : 'Volgende →';
  var extra = '';
  app.innerHTML =
    '<div class="card">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="qnum">Vraag '+(cur+1)+' / '+QUESTIONS.length+'</div>'+
      '<div class="qtext">'+esc(q.q)+'</div>'+
      imgHtml+ inner+
      '<div class="row">'+backBtn+'<button class="btn" onclick="next()">'+nextLabel+'</button></div>'+
      extra+
    '</div>';
  var tx = document.getElementById('txt');
  if(tx){ tx.focus(); tx.addEventListener('keydown',function(e){ if(e.key==='Enter') next(); }); }
}
function pick(i){ answers[cur]=i; render(); }
function prev(){ if(cur>0){cur--; render();} }
function next(){ if(cur < QUESTIONS.length-1){ cur++; render(); } else showResults(); }

function showResults(){
  var auto=0, autoTotal=0, rows='';
  for(var idx=0; idx<QUESTIONS.length; idx++){
    var q=QUESTIONS[idx], given='', badge='', correctLine='';
    if(q.t==='mc'){
      given = answers[idx]!==null ? q.opts[answers[idx]] : '—';
      if(q.correct===null||q.correct===undefined){ badge='<span class="badge b-open">Vrije keuze</span>'; }
      else { autoTotal++;
        if(answers[idx]===q.correct){ auto++; badge='<span class="badge b-good">Juist</span>'; }
        else { badge='<span class="badge b-bad">Fout</span>'; correctLine='<div class="res-correct">Juist: '+esc(q.opts[q.correct])+'</div>'; } }
    } else if(q.t==='text'){
      autoTotal++; given = answers[idx] || '—';
      var ok=false;
      for(var a=0;a<q.a.length;a++){ var na=norm(q.a[a]), ng=norm(answers[idx]);
        if(ng===na || (ng.length>2 && ng.indexOf(na)>=0)){ ok=true; break; } }
      if(ok){ auto++; badge='<span class="badge b-good">Juist</span>'; }
      else { badge='<span class="badge b-bad">Fout</span>'; correctLine='<div class="res-correct">Juist: '+esc(q.show)+'</div>'; }
    } else {
      given = answers[idx] || '—'; badge='<span class="badge b-open">Open</span>';
      correctLine='<div class="res-correct">Antwoord: '+esc(q.show)+'</div>';
    }
    rows += '<div class="res-q">'+badge+
      '<div style="font-weight:600;margin:4px 0">'+(idx+1)+'. '+esc(q.q)+'</div>'+
      '<div class="res-given">Jouw antwoord: '+esc(given)+'</div>'+correctLine+'</div>';
  }
  var pct = autoTotal? Math.round(auto/autoTotal*100):0;
  var emoji='🎉', msg='';
  if(pct>=80){ emoji='🏆'; msg='Wauw, jij kent Lotte door en door!'; }
  else if(pct>=50){ emoji='😄'; msg='Mooi gedaan! Een paar gemist, maar knap.'; }
  else { emoji='😅'; msg='Tijd voor een terugblik samen!'; }
  app.innerHTML =
    '<div class="card center">'+
      '<div class="emoji">'+emoji+'</div><h1>Jouw score</h1>'+
      '<div class="score-big">'+auto+' / '+autoTotal+'</div>'+
      '<div class="score-msg">'+msg+'</div>'+
      '<div class="hint">(De open vragen en foto\'s beoordeel je zelf — die tellen niet automatisch mee.)</div>'+
      '<button class="btn" onclick="restart()">Opnieuw spelen</button>'+
    '</div>'+
    '<div class="card"><h1 style="font-size:1.3rem">Alle antwoorden</h1>'+rows+'</div>';
  window.scrollTo(0,0);
}
function restart(){ cur=0; for(var i=0;i<answers.length;i++) answers[i]=null; render(); }

app.innerHTML =
  '<div class="card center">'+
    '<div class="emoji">🫂💙</div><h1>Quiz voor Lotte</h1>'+
    '<p class="sub">Hoe goed ken jij onze gedeelde herinneringen?<br>'+QUESTIONS.length+' vragen — meerkeuze, invullen én foto\'s.</p>'+
    '<button class="btn" onclick="render()">Start de quiz →</button>'+
  '</div>';
</script>
</body>
</html>
